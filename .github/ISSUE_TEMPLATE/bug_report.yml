name: Bug report
description: Report a problem with the docker-registry Helm chart
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: >-
        Thanks for filing a bug! This tracker is for the **Helm chart** only.
        Problems with the registry application itself belong in
        [distribution/distribution](https://github.com/distribution/distribution).
        For security issues, see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: values
    attributes:
      label: Values used
      description: The values that trigger the issue (redact secrets).
      render: yaml
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: e.g. the exact `helm install`/`helm template` command and what you observed.
    validations:
      required: true
  - type: input
    id: chart-version
    attributes:
      label: Chart version
      placeholder: e.g. 4.0.1
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Helm and Kubernetes versions
      placeholder: e.g. helm 3.18.4, k8s 1.34.1 (kind / docker-desktop / EKS ...)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Rendered output or logs
      description: Relevant `helm template` output, pod logs, or error messages.
      render: shell
