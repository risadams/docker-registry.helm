---
# GitHub Actions Workflows Ref: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
name: CI
"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
concurrency:
  group: ${{ github.event_name }}-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true
permissions: read-all

env:
  # helm-unittest's plugin.yaml uses the `platformHooks` field, which requires
  # helm >= 3.17; older helm fails the plugin install with an unmarshal error.
  HELM_VERSION: v3.18.4
  KUBECONFORM_VERSION: v0.8.0
  # SHA256 of kubeconform-linux-amd64.tar.gz for KUBECONFORM_VERSION, from the
  # release CHECKSUMS file. Bump this together with KUBECONFORM_VERSION above.
  KUBECONFORM_SHA256: "9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883"
  # Schema validation pins the exact patch used locally (docker-desktop 1.34.1).
  K8S_VERSION: "1.34.1"
  # kind only publishes node images for specific patches; v1.34.0 is the nearest
  # 1.34 image to the local docker-desktop cluster.
  KIND_NODE_IMAGE: kindest/node:v1.34.0

jobs:
  # ----- Fast, deterministic, REQUIRED (no cluster) --------------------------
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: ${{ env.HELM_VERSION }}
      - run: helm lint --strict .

  # Supply-chain guard (ADR-0013): every action must be pinned to a full commit
  # SHA, never a movable tag. Fails the build if any `uses:` is not SHA-pinned.
  actions-pinned:
    name: Actions pinned to SHA
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify every `uses:` is pinned to a 40-char commit SHA
        run: |
          unpinned="$(grep -rnE '^[[:space:]]*-?[[:space:]]*uses:' .github/workflows \
            | grep -vE 'uses:[[:space:]]*[^@]+@[0-9a-f]{40}([[:space:]]|#|$)' || true)"
          if [ -n "$unpinned" ]; then
            echo "::error::unpinned action reference(s); pin to a full commit SHA (ADR-0013):"
            echo "$unpinned"
            exit 1
          fi
          echo "all action references are SHA-pinned"

  docs:
    name: Docs (values.schema.json)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: ${{ env.HELM_VERSION }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Run docs layer (schema)
        run: bash tests/docs.sh

  static:
    name: Static (render + kubeconform + invariants)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kc.tgz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  /tmp/kc.tgz" | sha256sum -c -
          tar -C /usr/local/bin -xzf /tmp/kc.tgz kubeconform
          kubeconform -v
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run static layer
        run: bash tests/static.sh

  unit:
    name: Unit (helm-unittest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Run unit layer
        run: bash tests/unit.sh

  # ----- Cluster integration: NON-GATING by default -------------------------
  # Spins up a real (kind) cluster and runs the full functional suite. Marked
  # continue-on-error so a flaky ephemeral cluster never blocks a merge while the
  # result stays visible on the PR. To make it REQUIRED, delete the
  # `continue-on-error: true` line below.
  integration:
    name: Integration (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          node_image: ${{ env.KIND_NODE_IMAGE }}
          cluster_name: dr-ci
      - name: Cluster info
        run: kubectl get nodes -o wide
      - name: Run integration layer
        # kind's containerd is not the Actions docker daemon, so the host-side
        # docker push/pull depth is skipped; object + helm test + /v2 probes run.
        # INSTALL_CRDS=1 pulls the prometheus-operator CRDs for the metrics scenario.
        env:
          SKIP_DOCKER: "1"
          INSTALL_CRDS: "1"
          TIMEOUT: "240s"
        run: bash tests/integration.sh
