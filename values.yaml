# Default values for docker-registry.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replicaCount: 1

updateStrategy: {}
  # type: RollingUpdate
  # rollingUpdate:
  #   maxSurge: 1
  #   maxUnavailable: 0

podAnnotations: {}
podLabels: {}

# Mount the ServiceAccount API token into pods. Disabled by default for
# least-privilege; the registry does not talk to the Kubernetes API.
automountServiceAccountToken: false

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: false

image:
  repository: registry
  tag: 3.0.0
  pullPolicy: IfNotPresent
# imagePullSecrets:
    # - name: docker
deployment: {}
  # annotations:
  # labels:
service:
  # Whether to create the Service resource. Set to false when the Service is
  # managed externally (e.g. by another chart or an Ingress controller).
  create: true
  name: registry
  type: ClusterIP
  # sessionAffinity: None
  # sessionAffinityConfig: {}
  # clusterIP:
  port: 5000
  # nodePort:
  # loadBalancerIP:
  # loadBalancerSourceRanges:
  # ipFamilyPolicy: PreferDualStack
  # ipFamilies: []
  annotations: {}
  # foo.io/bar: "true"
  labels: {}
  # foo.io/baz: "false"
ingress:
  enabled: false
  className: nginx
  path: /
  # Used to create an Ingress record.
  hosts:
    - chart-example.local
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  labels: {}
  tls:
    # Secrets must be manually created in the namespace.
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# Gateway API HTTPRoute support, as an alternative to Ingress. Requires the
# Gateway API CRDs to be installed in the cluster
# (https://gateway-api.sigs.k8s.io/).
httproute:
  enabled: false
  # HTTPRoute apiVersion (defaults to "gateway.networking.k8s.io/v1" when empty)
  apiVersion: ""
  annotations: {}
  labels: {}
  # parentRefs reference the Gateway(s) this HTTPRoute is attached to
  # parentRefs:
  #   - name: my-gateway
  #     namespace: gateway-system
  #     sectionName: http
  parentRefs: []
  # hostnames matched against the HTTP Host header to select this route
  # hostnames:
  #   - chart-example.local
  hostnames: []
  # matches define conditions used to match incoming requests against the rule.
  # Defaults to a PathPrefix "/" match (mirrors the Ingress behavior above).
  matches:
    - path:
        type: PathPrefix
        value: /
  # filters applied to requests that match this rule
  filters: []
  # additionalRules (templated) prepends custom HTTPRoute rules
  additionalRules: []
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
persistence:
  accessMode: 'ReadWriteOnce'
  enabled: false
  size: 10Gi
  # storageClass: '-'
  # Retain the PVC when the release is deleted (adds the
  # "helm.sh/resource-policy": keep annotation).
  keep: true
  # Bind to a specific PersistentVolume by name.
  # volumeName: ""
  # Annotations to add to the PersistentVolumeClaim.
  annotations: {}
  ## Name of an existing PVC to use instead of creating one. Can be templated.
  # existingClaim:

# Use a StatefulSet instead of a Deployment. Useful when each replica needs its
# own PersistentVolume via volumeClaimTemplates. Default uses a Deployment.
useStatefulSet: false

# set the type of filesystem to use: filesystem, s3
storage: filesystem

# set sizeLimit for the emptyDir used when persistence is disabled.
# Default "0" means no limit.
emptydir:
  size: "0"

# Set this to name of secret for tls certs
# tlsSecretName: registry.docker.example.com

# If set, use an existing Secret instead of creating one. The existing Secret
# must contain the keys expected by your chosen auth/storage/proxy configuration
# (haSharedSecret, htpasswd, azure*/s3*/swift* keys, proxyUsername/proxyPassword).
existingSecret: ""

secrets:
  haSharedSecret: ""
  htpasswd: ""
# Secrets for Azure
#   azure:
#     accountName: ""
#     accountKey: ""
#     container: ""
# Secrets for S3 access and secret keys
# Use a secretRef with keys (accessKey, secretKey) for secrets stored outside the chart
#   s3:
#     secretRef: ""
#     accessKey: ""
#     secretKey: ""
# Secrets for Swift username and password
#   swift:
#     username: ""
#     password: ""

# Options for s3 storage type:
# s3:
#   region: us-east-1
#   regionEndpoint: https://s3.us-east-1.amazonaws.com
#   bucket: my-bucket
#   rootdirectory: /object/prefix
#   encrypt: false
#   secure: true
#   forcepathstyle: true
#   skipverify: true

# Options for swift storage type:
# swift:
#   authurl: http://swift.example.com/
#   container: my-container

# https://docs.docker.com/registry/recipes/mirror/
proxy:
  enabled: false
  remoteurl: https://registry-1.docker.io
  username: ""
  password: ""
  # the ref for a secret stored outside of this chart
  # Keys: proxyUsername, proxyPassword
  secretRef: ""

metrics:
  enabled: false
  port: 5001
  # Create a prometheus-operator ServiceMonitor
  serviceMonitor:
    enabled: false
    # Namespace where the ServiceMonitor should be installed (i.e. `monitoring`).
    # Defaults to the namespace where the chart is installed.
    namespace: ""
    labels: {}
  # Create a prometheus-operator PodMonitor as an alternative to the
  # ServiceMonitor (scrapes pods directly rather than via the Service).
  podMonitor:
    enabled: false
    labels: {}
  # prometheus-operator PrometheusRule defining alerting rules for a Prometheus instance
  prometheusRule:
    enabled: false
    labels: {}
    rules: {}

configPath: /etc/distribution
configData:
  version: 0.1
  log:
    fields:
      service: registry
  storage:
    cache:
      blobdescriptor: inmemory
  http:
    addr: :5000
    headers:
      X-Content-Type-Options: [nosniff]
    debug:
      addr: :5001
      prometheus:
        enabled: false
        path: /metrics
  health:
    storagedriver:
      enabled: true
      interval: 10s
      threshold: 3

containerSecurityContext:
  enabled: true
  seLinuxOptions: {}
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Whether to enable service links, which inject information about the services
# in the pod's namespace as environment variables.
enableServiceLinks: true

securityContext:
  enabled: true
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

priorityClassName: ""

podDisruptionBudget: {}
  # maxUnavailable: 1
  # minAvailable: 2

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 60 # available only on Kubernetes ≥1.23 [required "autoscaling/v2"]
  behavior: {} # available only on Kubernetes ≥1.23 [required "autoscaling/v2"]
#   scaleDown:
#     stabilizationWindowSeconds: 300
#     policies:
#     - type: Percent
#       value: 100
#       periodSeconds: 15
#   scaleUp:
#     stabilizationWindowSeconds: 0
#     policies:
#     - type: Percent
#       value: 100
#       periodSeconds: 15
#     - type: Pods
#       value: 4
#       periodSeconds: 15
#     selectPolicy: Max

nodeSelector: {}

affinity: {}

topologySpreadConstraints: {}

tolerations: []

extraVolumeMounts: []
## Additional volumeMounts to the registry container.
#  - mountPath: /secret-data
#    name: cloudfront-pem-secret
#    readOnly: true

extraVolumes: []
## Additional volumes to the pod.
#  - name: cloudfront-pem-secret
#    secret:
#      secretName: cloudfront-credentials
#      items:
#        - key: cloudfront.pem
#          path: cloudfront.pem
#          mode: 511

extraEnvVars: []
## Additional ENV variables to set
# - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
#   value: "/var/lib/example"

# # Custom livenessProbe config to override the default
# livenessProbe:
#   tcpSocket:
#     port: 5000

# # Custom readinessProbe config to override the default
# readinessProbe:
#   tcpSocket:
#     port: 5000

initContainers: []
## Init containers to add to the Deployment
# - name: init
#   image: busybox
#   command: []

extraContainers: []
## Extra (sidecar) containers to add to the Deployment / StatefulSet
# - name: istio-proxy
#   image: auto
#   securityContext:
#     allowPrivilegeEscalation: false
#     capabilities:
#       drop:
#         - ALL

garbageCollect:
  enabled: false
  deleteUntagged: true
  schedule: "0 1 * * *"
  restartPolicy: OnFailure
  podAnnotations: {}
  podLabels: {}
  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # Affinity specific to the garbage-collect CronJob pod. Falls back to the
  # top-level affinity when unset.
  affinity: {}
  extraEnvVars: []
  ## Additional ENV variables to set on the garbage-collect CronJob
  # - name: MY_GC_CRONJOB_VAR
  #   value: "yes"
