suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: creates a Secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docker-registry-secret

  - it: is absent when an existingSecret is referenced
    set:
      existingSecret: my-creds
    asserts:
      - hasDocuments:
          count: 0

  - it: stores the provided haSharedSecret
    set:
      secrets:
        haSharedSecret: abc123
    asserts:
      - equal:
          path: data.haSharedSecret
          # b64("abc123")
          value: YWJjMTIz

  - it: stores htpasswd when provided
    set:
      secrets:
        htpasswd: "user:hash"
    asserts:
      - isNotNullOrEmpty:
          path: data.htpasswd

  - it: emits azure keys for azure storage
    set:
      storage: azure
      secrets:
        azure:
          accountName: acct
          accountKey: key
          container: cont
    asserts:
      - isNotNullOrEmpty:
          path: data.azureAccountName
      - isNotNullOrEmpty:
          path: data.azureContainer

  - it: emits s3 keys for s3 storage
    set:
      storage: s3
      secrets:
        s3:
          accessKey: ak
          secretKey: sk
    asserts:
      - isNotNullOrEmpty:
          path: data.s3AccessKey
      - isNotNullOrEmpty:
          path: data.s3SecretKey

  - it: emits swift keys for swift storage
    set:
      storage: swift
      secrets:
        swift:
          username: u
          password: p
    asserts:
      - isNotNullOrEmpty:
          path: data.swiftUsername
      - isNotNullOrEmpty:
          path: data.swiftPassword
