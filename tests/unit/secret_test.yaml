suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: creates a Secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docker-registry-secret

  - it: is absent when an existingSecret is referenced
    set:
      existingSecret: my-creds
    asserts:
      - hasDocuments:
          count: 0

  - it: stores the provided haSharedSecret
    set:
      secrets:
        haSharedSecret: abc123
    asserts:
      - equal:
          path: data.haSharedSecret
          # b64("abc123")
          value: YWJjMTIz

  - it: stores htpasswd when provided
    set:
      secrets:
        htpasswd: "user:hash"
    asserts:
      - isNotNullOrEmpty:
          path: data.htpasswd

  - it: emits azure keys for azure storage
    set:
      storage: azure
      secrets:
        azure:
          accountName: acct
          accountKey: key
          container: cont
    asserts:
      - isNotNullOrEmpty:
          path: data.azureAccountName
      - isNotNullOrEmpty:
          path: data.azureContainer

  - it: emits s3 keys for s3 storage
    set:
      storage: s3
      secrets:
        s3:
          accessKey: ak
          secretKey: sk
    asserts:
      - isNotNullOrEmpty:
          path: data.s3AccessKey
      - isNotNullOrEmpty:
          path: data.s3SecretKey

  - it: emits swift keys for swift storage
    set:
      storage: swift
      secrets:
        swift:
          username: u
          password: p
    asserts:
      - isNotNullOrEmpty:
          path: data.swiftUsername
      - isNotNullOrEmpty:
          path: data.swiftPassword

  # --- upstream #187: haSharedSecret must be stable, not regenerated ---------
  - it: generates a 32-char haSharedSecret on first install when none is provided
    asserts:
      - isNotNullOrEmpty:
          path: data.haSharedSecret
      # randAlphaNum 32 -> 32 bytes -> 44-char base64 (ends in a single '=').
      # Asserts the request-signing secret has the hardened length.
      - matchRegex:
          path: data.haSharedSecret
          pattern: ^[A-Za-z0-9+/]{43}=$

  - it: uses the provided haSharedSecret verbatim (no random regeneration)
    set:
      secrets:
        haSharedSecret: stable-shared-secret
    asserts:
      # b64("stable-shared-secret"); a fixed value proves it is not randomized
      - equal:
          path: data.haSharedSecret
          value: c3RhYmxlLXNoYXJlZC1zZWNyZXQ=

  # --- upstream #71: S3 via instance profile (no secrets.s3) must not crash ---
  - it: renders for S3 storage without a secrets.s3 block (IAM instance profile)
    set:
      storage: s3
      s3:
        region: us-east-1
        bucket: my-bucket
    asserts:
      - isKind:
          of: Secret
      - isNull:
          path: data.s3AccessKey
      - isNull:
          path: data.s3SecretKey

  # --- upstream #95: redis blob cache password ------------------------------
  - it: stores the redis password in the chart Secret
    set:
      redis:
        password: s3cr3t
    asserts:
      - equal:
          path: data.redisPassword
          # b64("s3cr3t")
          value: czNjcjN0

  - it: does not store the redis password when an external secretRef is used
    set:
      redis:
        password: s3cr3t
        secretRef: external-redis
    asserts:
      - isNull:
          path: data.redisPassword
