suite: tls-secret
templates:
  - templates/tls-secret.yaml
tests:
  - it: is absent by default (plain HTTP)
    asserts:
      - hasDocuments:
          count: 0

  - it: is absent when only one of crt/key is provided
    set:
      tls:
        crt: CERTONLY
    asserts:
      - hasDocuments:
          count: 0

  - it: is absent when an external tlsSecretName is set (existing secret wins)
    set:
      tlsSecretName: external-tls
      tls:
        crt: CERTDATA
        key: KEYDATA
    asserts:
      - hasDocuments:
          count: 0

  - it: creates a kubernetes.io/tls Secret from inline crt/key
    set:
      tls:
        crt: CERTDATA
        key: KEYDATA
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docker-registry-tls
      - equal:
          path: type
          value: kubernetes.io/tls
      - equal:
          path: data["tls.crt"]
          value: Q0VSVERBVEE=
      - equal:
          path: data["tls.key"]
          value: S0VZREFUQQ==
