suite: ingress
templates:
  - templates/ingress.yaml
tests:
  - it: is absent by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an Ingress when networking.type is ingress
    set:
      networking:
        type: ingress
      ingress:
        hosts:
          - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.rules[0].host
          value: reg.example.com

  - it: renders an Ingress via legacy ingress.enabled flag (backward compat)
    set:
      ingress:
        enabled: true
        hosts:
          - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - isKind:
          of: Ingress

  - it: points the backend at the service name
    set:
      networking:
        type: ingress
      ingress:
        hosts:
          - reg.example.com
      service:
        name: registry
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: registry

  - it: sets the ingressClassName
    set:
      networking:
        type: ingress
      ingress:
        className: traefik
        hosts:
          - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: spec.ingressClassName
          value: traefik

  - it: renders tls config when provided
    set:
      networking:
        type: ingress
      ingress:
        hosts:
          - reg.example.com
        tls:
          - secretName: reg-tls
            hosts:
              - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: reg-tls

  - it: renders ingress annotations
    set:
      networking:
        type: ingress
      ingress:
        hosts:
          - reg.example.com
        annotations:
          nginx.ingress.kubernetes.io/rewrite-target: /
          cert-manager.io/cluster-issuer: letsencrypt
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: /
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt

  - it: omits the annotations key when no ingress annotations are set
    set:
      networking:
        type: ingress
      ingress:
        hosts:
          - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - notExists:
          path: metadata.annotations

  - it: merges custom ingress labels without duplicating release
    set:
      networking:
        type: ingress
      ingress:
        hosts:
          - reg.example.com
        labels:
          release: custom
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: metadata.labels.release
          value: custom
