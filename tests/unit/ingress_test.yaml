suite: ingress
templates:
  - templates/ingress.yaml
tests:
  - it: is absent by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an Ingress when enabled
    set:
      ingress:
        enabled: true
        hosts:
          - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.rules[0].host
          value: reg.example.com

  - it: points the backend at the service name
    set:
      ingress:
        enabled: true
        hosts:
          - reg.example.com
      service:
        name: registry
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: registry

  - it: sets the ingressClassName
    set:
      ingress:
        enabled: true
        className: traefik
        hosts:
          - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: spec.ingressClassName
          value: traefik

  - it: renders tls config when provided
    set:
      ingress:
        enabled: true
        hosts:
          - reg.example.com
        tls:
          - secretName: reg-tls
            hosts:
              - reg.example.com
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: reg-tls

  - it: merges custom ingress labels without duplicating release
    set:
      ingress:
        enabled: true
        hosts:
          - reg.example.com
        labels:
          release: custom
    capabilities:
      apiVersions:
        - networking.k8s.io/v1
    asserts:
      - equal:
          path: metadata.labels.release
          value: custom
