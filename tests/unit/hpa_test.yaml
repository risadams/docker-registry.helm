suite: hpa
templates:
  - templates/hpa.yaml
  - templates/hpaV1.yaml
tests:
  - it: renders no autoscaling/v2 HPA by default
    template: templates/hpa.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an autoscaling/v2 HPA when enabled
    template: templates/hpa.yaml
    set:
      autoscaling:
        enabled: true
    capabilities:
      apiVersions:
        - autoscaling/v2
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: apiVersion
          value: autoscaling/v2
      - equal:
          path: spec.scaleTargetRef.name
          value: RELEASE-NAME-docker-registry
      - equal:
          path: metadata.namespace
          value: NAMESPACE

  - it: honors min and max replicas
    template: templates/hpa.yaml
    set:
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 9
    capabilities:
      apiVersions:
        - autoscaling/v2
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 9

  - it: emits CPU, memory, and behavior when configured (autoscaling/v2)
    template: templates/hpa.yaml
    set:
      autoscaling:
        enabled: true
        targetCPUUtilizationPercentage: 75
        targetMemoryUtilizationPercentage: 80
        behavior:
          scaleDown:
            stabilizationWindowSeconds: 300
    capabilities:
      apiVersions:
        - autoscaling/v2
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 75
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 80
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 300

  - it: omits memory and behavior when not set (autoscaling/v2)
    template: templates/hpa.yaml
    set:
      autoscaling:
        enabled: true
        targetMemoryUtilizationPercentage: null
    capabilities:
      apiVersions:
        - autoscaling/v2
    asserts:
      - isNull:
          path: spec.behavior

  - it: falls back to autoscaling/v1 when v2 is unavailable
    template: templates/hpaV1.yaml
    set:
      autoscaling:
        enabled: true
    capabilities:
      apiVersions:
        - autoscaling/v1
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: apiVersion
          value: autoscaling/v1
      - equal:
          path: metadata.namespace
          value: NAMESPACE
