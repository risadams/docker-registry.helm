suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: is absent by default
    asserts:
      - hasDocuments:
          count: 0

  - it: is created when serviceAccount.create is true
    set:
      serviceAccount:
        create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: uses the provided name
    set:
      serviceAccount:
        create: true
        name: my-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-sa

  - it: defaults the name to the fullname
    set:
      serviceAccount:
        create: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docker-registry

  - it: sets automountServiceAccountToken
    set:
      serviceAccount:
        create: true
        automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: applies serviceAccount annotations
    set:
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123:role/x
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123:role/x
