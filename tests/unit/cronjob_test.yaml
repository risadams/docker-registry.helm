suite: cronjob
templates:
  - templates/cronjob.yaml
  - templates/configmap.yaml
  - templates/secret.yaml
tests:
  - it: is absent unless garbage collection is enabled
    template: templates/cronjob.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a CronJob when enabled
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docker-registry-garbage-collector

  - it: uses the configured schedule and restartPolicy
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
        schedule: "30 2 * * *"
        restartPolicy: Never
    asserts:
      - equal:
          path: spec.schedule
          value: "30 2 * * *"
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: Never

  - it: passes the delete-untagged flag through
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
        deleteUntagged: false
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].command
          content: "--delete-untagged=false"

  - it: appends garbageCollect.extraEnvVars
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
        extraEnvVars:
          - name: GC_FLAG
            value: "1"
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: GC_FLAG
            value: "1"

  - it: prefers garbageCollect.affinity over the top-level affinity
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: gc
                      operator: Exists
      affinity:
        podAntiAffinity: {}
    asserts:
      - isNotNullOrEmpty:
          path: spec.jobTemplate.spec.template.spec.affinity.nodeAffinity
      - isNull:
          path: spec.jobTemplate.spec.template.spec.affinity.podAntiAffinity

  # Lockstep with the Deployment/StatefulSet pod template: the GC pod must carry the
  # same identity/scheduling fields it previously dropped (ADR-0018).
  - it: carries automountServiceAccountToken and enableServiceLinks like the workload
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.jobTemplate.spec.template.spec.enableServiceLinks
          value: true

  - it: honours initContainers and topologySpreadConstraints on the GC pod
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
      initContainers:
        - name: warmup
          image: busybox
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: zone
          whenUnsatisfiable: DoNotSchedule
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: warmup
      - equal:
          path: spec.jobTemplate.spec.template.spec.topologySpreadConstraints[0].maxSkew
          value: 1

  - it: does not give the GC pod ports, probes, or sidecars
    template: templates/cronjob.yaml
    set:
      garbageCollect:
        enabled: true
      extraContainers:
        - name: istio-proxy
          image: auto
    asserts:
      # a single GC container, no injected sidecar that would block Job completion
      - lengthEqual:
          path: spec.jobTemplate.spec.template.spec.containers
          count: 1
      - notExists:
          path: spec.jobTemplate.spec.template.spec.containers[0].ports
      - notExists:
          path: spec.jobTemplate.spec.template.spec.containers[0].livenessProbe
