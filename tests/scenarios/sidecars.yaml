# Scenario: extra (sidecar) containers.
# Functional goal: the registry pod runs with an additional container alongside
# the registry, proving extraContainers plumbing.
extraContainers:
  - name: sidecar
    image: busybox:1.36
    command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
