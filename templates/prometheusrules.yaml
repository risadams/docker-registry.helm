{{- if and .Values.metrics.enabled .Values.metrics.prometheusRule.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ template "docker-registry.fullname" . }}
  labels:
    {{- $prLabels := merge (dict "app.kubernetes.io/component" "controller") (deepCopy (.Values.metrics.prometheusRule.labels | default dict)) -}}
    {{- include "docker-registry.labels.merged" (dict "ctx" . "extra" $prLabels) | nindent 4 }}
spec:
{{- if .Values.metrics.prometheusRule.rules }}
  groups:
  - name: {{ template "docker-registry.fullname" . }}
    rules: {{- toYaml .Values.metrics.prometheusRule.rules | nindent 4 }}
{{- else }}
  {{- /*
    PrometheusRule requires a non-empty spec; an empty `spec:` is rejected by the
    API ("spec: Required value"). Emit a valid empty groups list when no rules are
    configured so enabling prometheusRule without rules still applies cleanly.
  */}}
  groups: []
{{- end }}
{{- end }}
