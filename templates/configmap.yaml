{{- /* Blob caching and the garbage-collection cronjob do not mix. Work on a
       local deep copy so we never mutate the shared .Values: an in-place `set`
       would leak into any template rendered after this one and make behaviour
       depend on Helm's file render order. */ -}}
{{- $configData := deepCopy .Values.configData -}}
{{- if .Values.garbageCollect.enabled -}}
{{- $_ := set $configData.storage.cache "blobdescriptor" "disabled" -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "docker-registry.fullname" . }}-config
  namespace: {{ include "docker-registry.namespace" . }}
  labels:
    {{- include "docker-registry.labels" . | nindent 4 }}
data:
  config.yml: |-
{{ toYaml $configData | indent 4 }}
