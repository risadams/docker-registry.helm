{{- /*
Create a TLS Secret from inline cert/key material when `tls.crt` and `tls.key`
are provided and no external `tlsSecretName` is set. The registry mounts it at
/etc/ssl/docker (see _helpers.tpl). To use an externally-managed cert instead,
set `tlsSecretName` and leave `tls` empty.
*/ -}}
{{- if and (not .Values.tlsSecretName) .Values.tls .Values.tls.crt .Values.tls.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "docker-registry.fullname" . }}-tls
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "docker-registry.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.tls.crt | b64enc | quote }}
  tls.key: {{ .Values.tls.key | b64enc | quote }}
{{- end }}
